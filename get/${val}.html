<script>if(localStorage.getItem('theme')==='dark'||(localStorage.getItem('theme')!=='light'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark')}</script>
<link rel="stylesheet" href="../styles/output.css" type="text/css" media="screen">

<script type="text/javascript" src="http://cdnjs.cloudflare.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
<script type="text/javascript">
		if (!window.jQuery) {
			document.write('<script type="text/javascript" src="http://justnotepad.com/js/jquery/1.9.1/jquery.min.js"><\/script>');
		}
		</script>
<script type="text/javascript">
		$(document).ready(function() {
			// Validation of password:
			// https://api.jquery.com/submit/
			$("#password_form").submit(function(event) {
				// If "password" value length is zero:
				if ($("#get_draft_via_temp_url #get_draft_password #password").val().length === 0) {
					//$("#get_draft_via_temp_url #get_draft_status").html("<div class=\"error\">Password cannot be blank.</div>");
					//$("#get_draft_via_temp_url #get_draft_status").show();
					//return false;
					// Stopping the form from submitting and refreshing the page...
					event.preventDefault();
				} else if (!$("#get_draft_via_temp_url #get_draft_password #password").val().match(/^[A-Za-z0-9]{8,32}$/)) {
					// Else, if incorrect password ("password" !does not match the regex):
					$("#get_draft_via_temp_url #get_draft_status").html("<div class=\"error\">Incorrect password. Please try again.</div>");
					$("#get_draft_via_temp_url #get_draft_status").show();
					//return false;
					// Stopping the form from submitting and refreshing the page...
					event.preventDefault();
				} else {
					return;
				}
				// Stopping the form from submitting and refreshing the page...
				event.preventDefault();
			});
		});
		</script>
</head>
<body class="m-0 font-sans text-black bg-white dark:text-white dark:bg-dark-bg">
<div id="get_draft_via_temp_url" class="w-[90%] mx-auto my-[5%] text-center">
<h1 class="m-0 py-5 text-[250%] font-normal">Syncing via a&nbsp;Temporary Link</h1>
<div id="get_draft_desc" class="mb-5">Please provide the correct password:</div>
<form method="post" action="#" id="password_form">
<div id="get_draft_password" class="inline-block mr-5">
<input type="password" name="password" maxlength="32" value="" id="password" autocomplete="off" placeholder="Password" required class="w-[150px] p-[5px] rounded-sm border-2 border-light-gray dark:border-dark-border2 hover:border-[#aaa] focus:border-[#aaa] bg-white dark:bg-dark-bg text-black dark:text-white outline-none" />
</div>
<div id="get_draft_button" class="inline-block">
<button name="ok" id="ok" type="submit" class="px-3 py-[5px] border-2 border-light-gray dark:border-dark-border2 rounded bg-white dark:bg-dark-bg text-black dark:text-white cursor-pointer hover:border-[#aaa]">OK</button>
</div>
</form>
<div id="get_draft_status" class="mt-5 hidden">
<style>.error { color: #ff5050; }</style>
</div>
</div>
<div id="footer" class="w-[90%] mx-auto mt-[50px] pb-[50px]">

</div>

</body>
